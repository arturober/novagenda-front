<h2 mat-dialog-title>Editar nombre</h2>
<mat-dialog-content>
  <mat-form-field class="max-w-full pt-2 w-xs" appearance="outline">
    <mat-label>Nombre</mat-label>
    <input type="text" matInput [formField]="nameField" placeholder="Editar nombre" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>Cancelar</button>
  <button matButton [disabled]="nameField().invalid()" (click)="saveName()">Cambiar</button>
</mat-dialog-actions>
