<h2 mat-dialog-title>Nueva tarea</h2>
<mat-dialog-content>
  <mat-form-field class="max-w-full pt-2 w-xs" appearance="outline">
    <mat-label>Título</mat-label>
    <input type="text" matInput [formField]="taskForm.title" placeholder="Nueva tarea" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>Cancelar</button>
  <button matButton mat-dialog-close (click)="openNewTaskPage()">Más opciones</button>
  <button matButton [disabled]="taskForm().invalid()" (click)="addTask()">Crear</button>
</mat-dialog-actions>
