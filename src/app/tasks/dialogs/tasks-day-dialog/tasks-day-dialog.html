<h2 mat-dialog-title>{{ data.date | dateIntl: 'es-ES' : 'full' }}</h2>
<mat-dialog-content>
  <div class="flex flex-col gap-2">
  @for (task of data.tasks; track task.id) {
    <task-item [task]="task" (navigationTriggered)="close()"></task-item>
  } @empty {
    <p>No hay tareas para este día</p>
  }
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>Cerrar</button>
</mat-dialog-actions>
