<mat-card appearance="outlined" class="p-4">
  <mat-selection-list>
    <h3 class="text-lg flex gap-2 items-center">
      <mat-icon svgIcon="group"></mat-icon>
      Colaboradores
    </h3>

    @for (subtask of subtasks(); track subtask.id) {
      <mat-list-item>
        <div matListItemTitle>
          {{ subtask.description }}
        </div>

      </mat-list-item>
    }
  </mat-selection-list>

<button matButton="outlined" class="w-full" (click)="openNewSubtaskDialog()">
  Añadir Subtarea
</button>
</mat-card>
