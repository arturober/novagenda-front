<mat-card appearance="outlined" class="p-4">
  <mat-selection-list>
    <h3 class="text-lg flex gap-2 items-center">
      <mat-icon svgIcon="check-box"></mat-icon>
      Subtareas
    </h3>

    @for (subtask of subtasks(); track subtask.id) {
      <mat-list-option [value]="subtask" togglePosition="before" [(selected)]="subtask.completed" (click)="updateCompleted(subtask)">
        <button
            matListItemAvatar
            matIconButton
            aria-label="Borrar colaborador"
            class="mt-2"
            (click)="deleteSubtask($event, subtask)"
          >
            <mat-icon svgIcon="delete"></mat-icon>
          </button>
        <div matListItemTitle [class.line-through]="subtask.completed">
          {{ subtask.description }}
        </div>
      </mat-list-option>
    }
  </mat-selection-list>

<button matButton="outlined" class="w-full" (click)="openNewSubtaskDialog()">
  Añadir Subtarea
</button>
</mat-card>
