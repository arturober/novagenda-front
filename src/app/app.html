<mat-sidenav-container
  class="min-h-screen"
  [hasBackdrop]="!isBigScreen()"
  class="overflow-visible!"
>
  <mat-sidenav
    #drawer
    mode="side"
    [mode]="isBigScreen() ? 'side' : 'over'"
    [disableClose]="isBigScreen()"
    [fixedInViewport]="true"
    [opened]="sideMenuOpen() && logged()"
    (openedChange)="this.sideMenuService.open.set($event)"
    [autoFocus]="false"
  >
    @if (user(); as user) {
      <mat-list-item
        class="border-b border-b-gray-300 cursor-pointer"
        [routerLink]="['/profile']"
        (click)="sideMenuService.open.set(false)"
      >
        <img matListItemAvatar [src]="user.photo" alt="Foto del usuario" />
        <h3 matListItemTitle>{{ user.name }}</h3>
        <p matListItemLine>{{ user.email }}</p>
      </mat-list-item>
    }
    <mat-nav-list [autofocus]="false">
      <a
        mat-list-item
        [routerLink]="['/tasks']"
        [activated]="currentUrl().startsWith('/tasks') && currentUrl() !== '/tasks/add'"
        (click)="sideMenuService.open.set(false)"
      >
        <mat-icon matListItemIcon svgIcon="checklist"></mat-icon>
        <span matListItemTitle>Mis Tareas</span>
      </a>
      <a
        mat-list-item
        [routerLink]="['/tasks', 'add']"
        [activated]="currentUrl() === '/tasks/add'"
        (click)="sideMenuService.open.set(false)"
      >
        <mat-icon matListItemIcon svgIcon="add-task"></mat-icon>
        <span matListItemTitle>Nueva Tarea</span>
      </a>
      <a
        mat-list-item
        [routerLink]="['/categories']"
        [activated]="currentUrl() === '/categories'"
        (click)="sideMenuService.open.set(false)"
      >
        <mat-icon matListItemIcon svgIcon="category"></mat-icon>
        <span matListItemTitle>Categorías</span>
      </a>
      <a
        mat-list-item
        [routerLink]="['/invitations']"
        [activated]="currentUrl() === '/invitations'"
        (click)="sideMenuService.open.set(false)"
      >
        <mat-icon
          matListItemIcon
          svgIcon="group"
          aria-hidden="false"
          [matBadge]="invitations()"
        ></mat-icon>
        <span matListItemTitle>Invitaciones</span>
      </a>
    </mat-nav-list>
    <mat-action-list>
      <button mat-list-item (click)="logout()">
        <mat-icon matListItemIcon aria-label="Cerrar sesión" svgIcon="logout"></mat-icon>
        <h3 matListItemTitle>Cerrar Sesión</h3>
      </button>
    </mat-action-list>
  </mat-sidenav>
  <mat-sidenav-content class="overflow-visible! flex flex-col md:flex-row">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
