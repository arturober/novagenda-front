<mat-drawer-container class="min-h-screen" [hasBackdrop]="true">
  <mat-drawer #drawer mode="side">I'm a drawer</mat-drawer>
  <mat-drawer-content>
    <mat-toolbar>
      <button mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
    </mat-toolbar>
  </mat-drawer-content>
</mat-drawer-container>
